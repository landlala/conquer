  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>한반도 퍼즐</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f8f8f5;
        --piece: #eeeeee;
        --piece-overlap: 24;
        --line: #6a6a6a;
        --outer: #0c0c0c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: clamp(12px, 3vw, 28px);
        background: var(--paper);
        font-family: Arial, "Noto Sans KR", sans-serif;
      }

      main {
        width: min(94vw, 660px);
        height: min(96vh, 1120px);
        display: grid;
        place-items: center;
      }

      svg {
        width: 100%;
        height: 100%;
        max-height: 100%;
        overflow: visible;
        touch-action: manipulation;
      }

      .piece,
      .piece path {
        fill: var(--piece-fill, var(--piece));
        stroke: var(--piece-fill, var(--piece));
        stroke-width: var(--piece-overlap);
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-miterlimit: 1;
        paint-order: stroke fill;
        cursor: pointer;
        transition:
          fill 180ms ease,
          stroke 180ms ease,
          filter 180ms ease;
      }

      .piece:hover,
      .piece:focus-visible,
      .piece:hover path,
      .piece:focus-visible path {
        filter: brightness(0.97);
      }

      .piece:focus-visible {
        outline: none;
      }

      .piece.is-locked,
      .piece.is-locked path {
        cursor: default;
      }

      .map-fill {
        fill: var(--piece);
        pointer-events: none;
      }

      .inner-line {
        fill: none;
        stroke: var(--line);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 9 9;
        pointer-events: none;
      }

      .outer-line {
        fill: none;
        stroke: var(--outer);
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-miterlimit: 1;
        pointer-events: none;
      }

      .number {
        fill: #050505;
        font-size: 42px;
        font-weight: 400;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
        user-select: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>

    <p id="status" class="sr-only" aria-live="polite"></p>

    <script>
      const colors = [
        "#ef6f6c",
        "#f0a04b",
        "#f5cf5c",
        "#8fca5a",
        "#4fb477",
        "#41b8a6",
        "#43a7cf",
        "#5b8def",
        "#8374d8",
        "#b26cd5",
        "#de6eb1",
        "#e06f88",
        "#b88652",
        "#98a55f",
        "#5ea078",
        "#4f9aa3",
        "#668ac8",
        "#9676b5",
        "#d37f60",
        "#84a1a8",
      ];
      const randomValues = Array.from(
        { length: 20 },
        (_, index) => (index + 1) * 10,
      );
      const status = document.querySelector("#status");

      function randomMultipleOfTen() {
        const index = Math.floor(Math.random() * randomValues.length);
        return randomValues[index];
      }

      function activatePiece(piece) {
        if (piece.classList.contains("is-locked")) {
          return;
        }

        const id = Number(piece.dataset.piece);
        const nextNumber = randomMultipleOfTen();
        const label = document.querySelector(`.number[data-piece="${id}"]`);

        piece.style.setProperty("--piece-fill", colors[id - 1]);
        piece.classList.add("is-locked");
        piece.setAttribute("aria-disabled", "true");
        piece.setAttribute(
          "aria-label",
          `${id}번 조각 선택됨, 숫자 ${nextNumber}`,
        );

        if (label) {
          label.textContent = nextNumber;
        }

        status.textContent = `${id}번 조각이 선택되어 ${nextNumber}(으)로 변경되었습니다.`;
      }

      document.querySelectorAll(".piece[data-piece]").forEach((piece) => {
        piece.addEventListener("click", () => activatePiece(piece));
        piece.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") {
            return;
          }

          event.preventDefault();
          activatePiece(piece);
        });
      });
    </script>

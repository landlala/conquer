<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>한반도 퍼즐</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f6f7f9;
        --ink: #050505;
        --piece: #ffffff;
        --piece-hover: #eef3ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.85), transparent 28rem),
          var(--page);
        font-family:
          Arial,
          "Noto Sans KR",
          sans-serif;
      }

      main {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(12px, 2.6vw, 32px);
      }

      svg {
        width: min(94vw, 760px);
        height: min(96vh, 980px);
        display: block;
        overflow: visible;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        filter: drop-shadow(0 14px 26px rgba(26, 31, 38, 0.12));
      }

      .lattice {
        fill: var(--ink);
        fill-rule: evenodd;
        pointer-events: none;
      }

      .piece {
        fill: var(--piece);
        stroke: none;
        cursor: pointer;
        pointer-events: visiblePainted;
        -webkit-tap-highlight-color: transparent;
        transition:
          fill 160ms ease,
          filter 160ms ease;
      }

      .piece:not(.is-locked):hover {
        fill: var(--piece-hover);
      }

      .piece:focus,
      .piece:focus-visible {
        outline: none;
      }

      .load-error {
        max-width: min(88vw, 28rem);
        color: #2d3138;
        font-size: 0.95rem;
        line-height: 1.6;
        text-align: center;
      }

      .is-hidden,
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <svg
        id="puzzle"
        viewBox="0 0 800 1024"
        role="img"
        aria-labelledby="map-title map-desc"
      >
        <title id="map-title">한반도 137조각 퍼즐</title>
        <desc id="map-desc">참고 SVG의 외곽선과 137개 조각을 유지한 클릭 가능한 퍼즐 지도입니다.</desc>
        <path id="lattice" class="lattice" aria-hidden="true"></path>
        <g id="piece-layer"></g>
      </svg>
      <p id="load-error" class="load-error is-hidden" role="status">
        koreapuzzle.svg를 불러올 수 없습니다. 로컬 서버에서 index.html을 열어 주세요.
      </p>
    </main>
    <p id="status" class="sr-only" aria-live="polite"></p>

    <script>
      const EXPECTED_PIECE_COUNT = 137;
      const SVG_NS = "http://www.w3.org/2000/svg";

      const puzzle = document.querySelector("#puzzle");
      const lattice = document.querySelector("#lattice");
      const pieceLayer = document.querySelector("#piece-layer");
      const loadError = document.querySelector("#load-error");
      const status = document.querySelector("#status");
      const usedColors = new Set();

      function splitSubpaths(pathData) {
        return pathData
          .trim()
          .match(/M[\s\S]*?(?=\s*M|$)/g)
          .map((path) => path.trim())
          .filter(Boolean);
      }

      function randomColor() {
        let color = "";

        do {
          const hue = Math.floor(Math.random() * 360);
          const saturation = 58 + Math.floor(Math.random() * 22);
          const lightness = 48 + Math.floor(Math.random() * 18);
          color = `hsl(${hue} ${saturation}% ${lightness}%)`;
        } while (usedColors.has(color));

        usedColors.add(color);
        return color;
      }

      function lockPiece(piece) {
        if (piece.classList.contains("is-locked")) {
          return;
        }

        const color = randomColor();
        const number = piece.dataset.piece;

        piece.style.fill = color;
        piece.classList.add("is-locked");
        piece.setAttribute("aria-disabled", "true");
        piece.setAttribute("tabindex", "-1");
        piece.setAttribute("aria-label", `${number}번 조각 선택됨`);
        status.textContent = `${number}번 조각의 색상이 변경되었습니다.`;
      }

      function createPiece(pathData, index) {
        const piece = document.createElementNS(SVG_NS, "path");
        const number = String(index + 1);

        piece.classList.add("piece");
        piece.dataset.piece = number;
        piece.setAttribute("d", pathData);
        piece.setAttribute("role", "button");
        piece.setAttribute("tabindex", "0");
        piece.setAttribute("aria-label", `${number}번 조각`);

        piece.addEventListener("click", () => lockPiece(piece));
        piece.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") {
            return;
          }

          event.preventDefault();
          lockPiece(piece);
        });

        return piece;
      }

      async function loadPuzzle() {
        try {
          const response = await fetch("koreapuzzle.svg", { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`SVG load failed: ${response.status}`);
          }

          const source = await response.text();
          const documentSvg = new DOMParser().parseFromString(source, "image/svg+xml");
          const sourcePath = documentSvg.querySelector("path");
          const sourceSvg = documentSvg.querySelector("svg");

          if (!sourcePath || !sourceSvg) {
            throw new Error("SVG path not found");
          }

          const viewBox = sourceSvg.getAttribute("viewBox") || "0 0 800 1024";
          const subpaths = splitSubpaths(sourcePath.getAttribute("d"));
          const pieces = subpaths.slice(1);

          if (pieces.length !== EXPECTED_PIECE_COUNT) {
            console.warn(`Expected ${EXPECTED_PIECE_COUNT} pieces, found ${pieces.length}.`);
          }

          puzzle.setAttribute("viewBox", viewBox);
          lattice.setAttribute("d", subpaths.join(" "));
          pieceLayer.replaceChildren(...pieces.map(createPiece));

          status.textContent = `${pieces.length}개의 퍼즐 조각이 준비되었습니다.`;
        } catch (error) {
          console.error(error);
          puzzle.classList.add("is-hidden");
          loadError.classList.remove("is-hidden");
        }
      }

      loadPuzzle();
    </script>
  </body>
</html>
